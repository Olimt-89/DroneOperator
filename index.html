<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef2f7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Operator Contact - Ole Morten Tengesdal</title>

  <meta name="description" content="Operator contact information for Ole Morten Tengesdal." />
  <meta name="robots" content="noindex, nofollow" />

  <style>
    :root {
      color-scheme: light;

      --bg-start: #eef2f7;
      --bg-end: #f8fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --border: #e5e7eb;
      --badge-bg: #ccfbf1;
      --badge-text: #134e4a;
      --button-secondary-bg: #ffffff;
      --button-secondary-hover: #f0fdfa;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;

        --bg-start: #0f172a;
        --bg-end: #111827;
        --card: #111827;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --primary: #2dd4bf;
        --primary-dark: #14b8a6;
        --border: #334155;
        --badge-bg: rgba(45, 212, 191, 0.14);
        --badge-text: #99f6e4;
        --button-secondary-bg: #1e293b;
        --button-secondary-hover: #263449;
        --shadow: rgba(0, 0, 0, 0.35);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      height: 100%;
      background-color: var(--bg-start);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(24px + env(safe-area-inset-top))
        calc(24px + env(safe-area-inset-right))
        calc(24px + env(safe-area-inset-bottom))
        calc(24px + env(safe-area-inset-left));
      position: relative;
      overflow-x: hidden;
      background-color: var(--bg-start);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      z-index: -1;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 50px var(--shadow);
      padding: 32px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .drone-image {
      display: block;
      width: 180px;
      max-width: 75%;
      height: auto;
      margin: 0 auto 22px;
      border-radius: 18px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: var(--text);
    }

    .subtitle {
      margin: 10px 0 28px;
      color: var(--muted);
      font-size: 16px;
    }

    .info {
      text-align: left;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      margin-bottom: 24px;
    }

    .row {
      margin-bottom: 16px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .value {
      font-size: 17px;
      font-weight: 600;
      word-break: break-word;
      color: var(--text);
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .buttons {
      display: grid;
      gap: 12px;
    }

    .button {
      display: block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border: 1px solid var(--primary);
      transition: 0.2s ease;
    }

    .button.primary {
      background: var(--primary);
      color: #ffffff;
    }

    .button.primary:hover {
      background: var(--primary-dark);
      text-decoration: none;
    }

    .button.secondary {
      background: var(--button-secondary-bg);
      color: var(--primary);
    }

    .button.secondary:hover {
      background: var(--button-secondary-hover);
      text-decoration: none;
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">Drone Operator Contact Information</div>

    <img
      class="drone-image"
      src="dji%20neo%202.png"
      alt="DJI Neo 2 drone"
    />

    <section class="info">
      <div class="row">
        <div class="label">Operator Number</div>
        <div class="value">NORyx2uz22xkcp6q</div>
      </div>

      <div class="row">
        <div class="label">Name</div>
        <div class="value">Ole Morten Tengesdal</div>
      </div>

      <div class="row">
        <div class="label">Phone</div>
        <div class="value">
          <a href="tel:+4747510371">+47 47 51 03 71</a>
        </div>
      </div>

      <div class="row">
        <div class="label">Email</div>
        <div class="value">
          <a href="mailto:olemortentengesdal@hotmail.com">olemortentengesdal@hotmail.com</a>
        </div>
      </div>
    </section>

    <div class="buttons">
      <a class="button primary" href="contact.vcf" download>
        Save Contact
      </a>

      <a class="button secondary" href="tel:+4747510371">
        Call
      </a>

      <a class="button secondary" href="mailto:olemortentengesdal@hotmail.com">
        Send Email
      </a>
    </div>

    <p class="footer">
      This page contains operator contact details for identification and contact purposes.
    </p>
  </main>
</body>
</html>
